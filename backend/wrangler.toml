name = "calculaya-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"
# FCM_SERVER_KEY se configura como secret:
# npx wrangler secret put FCM_SERVER_KEY

[[kv_namespaces]]
binding = "CALCULAYA_KV"
id = "1950d4cfc2e74d049adf6265f4b9acbb"

# Cron: cada 15 min durante ventana BCV (4-6 PM VET = 20-22 UTC)
# + una vez a las 8 AM VET (12 UTC) para verificar que tenemos dato del dia anterior
[triggers]
crons = ["*/15 20-21 * * 1-5", "0 12 * * 1-5"]
