name: calculaya
description: Calculadora de cambio BCV para Venezuela
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  google_mobile_ads: ^5.1.0
  share_plus: ^7.2.1
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  url_launcher: ^6.2.4
  qr_flutter: ^4.1.0
  camera: ^0.10.5
  google_mlkit_text_recognition: ^0.13.0
  permission_handler: ^11.3.0
  in_app_purchase: ^3.2.0
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/Nuevo-icono.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#E53935"
  adaptive_icon_foreground: "assets/Nuevo-icono.jpg"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
