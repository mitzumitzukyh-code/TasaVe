name: tasave
description: Consulta de tasa de cambio BCV para Venezuela
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  go_router: ^14.2.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  google_mobile_ads: ^5.1.0
  share_plus: ^7.2.1
  connectivity_plus: ^6.0.3
  intl: ^0.19.0
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#07070A"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
