  <!-- Web Push: registrar Service Worker y suscribirse -->
  <script>
  if ('serviceWorker' in navigator && 'PushManager' in window) {
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('/push-sw.js');
        console.log('Push SW registrado:', reg.scope);

        // Exponer funciones para que Flutter las llame via JS interop
        window.tasavePush = {
          async subscribe() {
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') return null;

            // Obtener VAPID public key del backend
            const res = await fetch('https://tasave-api.workers.dev/push/vapid-key');
            const { publicKey } = await res.json();
            const vapidKey = urlBase64ToUint8Array(publicKey);

            const subscription = await reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: vapidKey,
            });

            // Enviar suscripción al backend
            await fetch('https://tasave-api.workers.dev/push/subscribe', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                subscription: subscription.toJSON(),
                alerts: [{ type: 'daily_rate', enabled: true }],
              }),
            });

            return 'subscribed';
          },

          async unsubscribe() {
            const subscription = await reg.pushManager.getSubscription();
            if (!subscription) return;
            await fetch('https://tasave-api.workers.dev/push/unsubscribe', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ endpoint: subscription.endpoint }),
            });
            await subscription.unsubscribe();
            return 'unsubscribed';
          },

          async isSubscribed() {
            const subscription = await reg.pushManager.getSubscription();
            return !!subscription;
          },
        };
      } catch (err) {
        console.warn('Push SW error:', err);
      }
    });
  }

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }
  </script>
